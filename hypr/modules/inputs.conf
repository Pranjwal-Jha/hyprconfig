input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options = 
  kb_rules =
  repeat_rate = 50
  repeat_delay = 300
  
  sensitivity = 0 #mouse sensitivity
  numlock_by_default = true
  left_handed = false
  follow_mouse = true
  float_switch_override_focus = false

  touchpad {
    disable_while_typing = true
    natural_scroll = true
    clickfinger_behavior = false
    middle_button_emulation = true
    tap-to-click = true
    drag_lock = false
  }
  
  # below for devices with touchdevice ie. touchscreen
  touchdevice {
    enabled = true
  }
	
  # below is for table see link above for proper variables
  tablet {
    transform = 0
    left_handed = 0
  }

}

device {
    name = razer-razer-viper-8khz
    sensitivity = 0.2  # Adjust this if needed for your mouse
}

device {
    name = elan06fa:00-04f3:327e-touchpad
    sensitivity = 0.0  # Increase this value (range: -1.0 to 1.0)
}
