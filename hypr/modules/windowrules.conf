#--------------states of specific applications-------------------#
#----------------------------------------------------------------#
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(thunar)$
windowrulev2 = float, class:^(blueman-manager)$

#--------------opacity of specific applications------------------#
#----------------------------------------------------------------#
windowrulev2 = opacity 1.0 0.7, class:^([Ll]ibreWolf|[Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Zz]en)$
windowrulev2 = opacity 0.9 0.5, class:^(org.gnome.Nautilus)$
windowrulev2 = opacity 1.0 0.7, class:^(blueman-manager)$
windowrulev2 = opacity 1.0 0.7, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = opacity 1.0 0.7, class:^(nwg-look)$
windowrulev2 = opacity 0.9 0.6,class:^(zen)$
windowrulev2 = opacity 1.0 0.8 class:^(com.discordapp.Discord)$
windowrulev2 = opacity 0.9 0.8 class:^(Spotify)$
windowrulev2 = opacity 1.0 0.5 class:^(obsidian)$
windowrulev2 = opacity 1.0 0.8 class:^(dev.zed.Zed)$
windowrulev2 = opacity 0.9 0.5 class:^(google-chrome)$
windowrulev2 = workspace unset class:^(google-chrome)$
windowrulev2 = opacity 0.9 0.5 class:^(Research)$


windowrulev2 = float, class:^(kitty)$
windowrulev2 = size 800 600, class:^(kitty)$
windowrulev2 = center, class:^(kitty)$
windowrulev2 = opacity 0.9 0.6 class:^(kitty)$



#---------------sizes of specific applications in floating mode-------------------#
#---------------------------------------------------------------------------------#
windowrulev2 = size 689 400, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = size 826 800, class:^(blueman-manager)$

#---------------browser picture in picture----------------------------------------#
#---------------------------------------------------------------------------------#
windowrulev2 = float,title:^(Picture-in-Picture)$
windowrulev2 = pin,title:^(Picture-in-Picture)$
windowrulev2 = move 72.5% 70%, title:^(Picture-in-Picture)$
windowrulev2 = size 520 320, title:^(Picture-in-Picture)$

#---------------kitty network term-------------------------#
#---------------------------------------------------------#
windowrulev2 = float,title:^(TermNmtui)$
windowrulev2 = center, title:^(TermNmtui)$
windowrulev2 = size 800 800, title:^(TermNmtui)$

#  в”“ в”Џв”“в”“в”Џв”Џв”“в”ів”“  в”ів”“в”ів”ів”“ в”Џв”“в”Џв”“
#  в”ѓ в”Јв”«в”—в”«в”Ј в”Јв”«  в”Јв”«в”ѓв”ѓв”ѓ в”Ј в”—в”“
#  в”—в”›в”›в”—в”—в”›в”—в”›в”›в”—  в”›в”—в”—в”›в”—в”›в”—в”›в”—в”›
#                        


#---------xray--------------#
#---------------------------#
layerrule = xray 1, .*

#-----------waybar-------------#
#------------------------------#
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = ignorealpha 0.5, waybar

#-----------swaync-------------#
#------------------------------#
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window
layerrule = xray 0, swaync-control-center
layerrule = xray 0, swaync-notification-window

#----------rofi---------------#
#-----------------------------#
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = xray 0, rofi

#---------wlogout------------#
#----------------------------#
layerrule = blur, logout_dialog
