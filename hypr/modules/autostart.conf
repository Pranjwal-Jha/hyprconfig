# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH
exec-once = dbus-update-activation-environment --systemd --all # for XDPH
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

exec-once = hypridle

exec-once = killall -q swww;sleep .5 && swww-daemon
exec-once = killall -q waybar;sleep .5 && waybar
exec-once = killall -q swaync;sleep .5 && swaync

exec-once = nm-applet --indicator
exec-once = blueman-applet

exec-once = ghostty --gtk-single-instance=true --quit-after-last-window-closed=false --initial-window=false

#polkit agent (without uwsm)
exec-once = /usr/libexec/hyprpolkitagent

#Night Light
exec = wl-gammarelay

#Dual Monitor
# exec = hyprctl output create headless HEADLESS-2
# exec = wayvnc -o HEADLESS-2 0.0.0.0 5900

exec-once = pypr
exec-once = /home/pranj/Documents/Apps/syncthing-linux-amd64-v2.0.13/syncthing -no-browser

#QuickShell widget daemon (persistent IPC process)
exec-once = quickshell -p ~/.config/quickshell/Main.qml
